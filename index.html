<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LINE | Video Editor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020510;
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
}

.glass{

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

padding:40px;

border-radius:32px;

max-width:800px;

animation:float 6s infinite ease-in-out;

}

h1{
font-size:80px;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

.telegram{

display:inline-block;

padding:12px 20px;

background:rgba(120,180,255,.15);

border-radius:16px;

text-decoration:none;

color:white;

}

section{
padding:80px 20px;
}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(260px,1fr)
);

gap:20px;

}

.card{

background:
rgba(255,255,255,.06);

padding:90px 20px;

border-radius:24px;

backdrop-filter:blur(20px);

transition:.4s;

}

.card:hover{

transform:
translateY(-8px);

box-shadow:
0 0 30px
rgba(
120,
180,
255,
.2
);

}

footer{

padding:60px;

text-align:center;

opacity:.7;

}

@keyframes float{

50%{

transform:
translateY(-10px);

}

}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<section class="hero">

<div class="glass">

<h1>
LINE
</h1>

<div class="subtitle">

Creative Video Editing • Motion • Short Form Content

</div>

<a
class="telegram"
href="https://t.me/line_editor"
>

Telegram

</a>

</div>

</section>

<section>

<h2>

Horizontal Edits

</h2>

<div class="grid">

<div class="card">

Featured Edit

</div>

<div class="card">

Project 02

</div>

</div>

</section>

<section>

<h2>

Vertical Edits

</h2>

<div class="grid">

<div class="card">

Vertical 01

</div>

<div class="card">

Vertical 02

</div>

<div class="card">

Vertical 03

</div>

</div>

</section>

<footer>

END OF TRANSMISSION

</footer>

<script>

const c=
document
.getElementById(
"bg"
);

const ctx=
c.getContext(
"2d"
);

function resize(){

c.width=
innerWidth;

c.height=
innerHeight;

}

resize();

onresize=
resize;

let stars=
[
...Array(
450
)
]

.map(
()=>({

x:
Math.random()
*c.width,

y:
Math.random()
*c.height,

s:
Math.random()
*3+1

})
);

function draw(){

ctx.clearRect(

0,

0,

c.width,

c.height

);

stars.forEach(
st=>{

ctx.fillStyle=
"#8ccfff";

ctx.fillRect(

st.x,

st.y,

st.s,

st.s

);

st.y+=
st.s
*.15;

if(
st.y>
c.height
)

st.y=0;

}

);

requestAnimationFrame(
draw
);

}

draw();

</script>

</body>

</html>
