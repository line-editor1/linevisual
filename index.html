<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LINE | Video Editor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
radial-gradient(
circle at top,
#0b1730,
#020510 60%
);

color:white;

overflow-x:hidden;

}

canvas{

position:fixed;

inset:0;

z-index:-3;

}

#hud{

position:fixed;

right:8px;

top:0;

width:4px;

height:0;

background:#8ccfff;

box-shadow:
0 0 20px #8ccfff;

z-index:50;

}

.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

text-align:center;

position:relative;

}

.glass{

background:
rgba(
255,
255,
255,
.08
);

backdrop-filter:
blur(
28px
);

border:
1px solid
rgba(
255,
255,
255,
.12
);

border-radius:
36px;

padding:
42px;

box-shadow:

0 10px 40px
rgba(
0,
0,
0,
.25
),

inset 0 1px 0
rgba(
255,
255,
255,
.1
);

}

.heroCard{

max-width:
850px;

animation:
float 7s
ease-in-out infinite;

}

.logo{

font-size:
100px;

font-weight:bold;

margin-bottom:
10px;

background:
linear-gradient(
90deg,
#ffffff,
#8ccfff
);

-webkit-background-clip:text;

-webkit-text-fill-color:
transparent;

position:relative;

}

.logo::after{

content:"";

position:absolute;

left:0;

bottom:-10px;

width:100%;

height:2px;

background:
linear-gradient(
90deg,
transparent,
#8ccfff,
transparent
);

animation:
scan 3s infinite;

}

.subtitle{

opacity:.8;

margin-bottom:
25px;

font-size:
18px;

}

.telegram{

display:inline-block;

padding:
14px 24px;

border-radius:
18px;

text-decoration:none;

color:white;

background:
rgba(
120,
180,
255,
.15
);

transition:
.3s;

}

.telegram:hover{

transform:
translateY(-3px);

box-shadow:
0 0 20px
rgba(
120,
180,
255,
.3
);

}

section{

padding:
90px 20px;

position:relative;

z-index:2;

}

.sectionTitle{

font-size:
34px;

margin-bottom:
30px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
260px,
1fr
)
);

gap:
24px;

}

.card{

background:
rgba(
255,
255,
255,
.06
);

backdrop-filter:
blur(
20px
);

border-radius:
30px;

padding:
100px 20px;

position:relative;

overflow:hidden;

transition:
.45s;

cursor:pointer;

}

.card::before{

content:"";

position:absolute;

inset:0;

background:

linear-gradient(
120deg,

transparent,

rgba(
255,
255,
255,
.12
),

transparent

);

transform:
translateX(
-100%
);

transition:
1s;

}

.card:hover::before{

transform:
translateX(
100%
);

}

.card:hover{

transform:

translateY(
-12px
)

rotateX(
5deg
);

box-shadow:

0 0 45px

rgba(
120,
180,
255,
.25
);

}

.cardGlow{

position:absolute;

inset:-50%;

background:
radial-gradient(
circle,
rgba(
120,
180,
255,
.15
),
transparent 70%
);

opacity:0;

transition:
.4s;

}

.card:hover .cardGlow{

opacity:1;

}

.reveal{

opacity:0;

transform:
translateY(
60px
);

transition:
1s;

}

.show{

opacity:1;

transform:none;

}

footer{

padding:
90px;

text-align:center;

opacity:.6;

}

@keyframes float{

50%{

transform:
translateY(
-14px
);

}

}

@keyframes scan{

0%{

transform:
translateX(
-100%
);

}

100%{

transform:
translateX(
100%
);

}

}

@media(
max-width:700px
){

.logo{

font-size:
70px;

}

.glass{

padding:
28px;

}

.card{

padding:
80px 20px;

}

}

</style>

</head>

<body>

<canvas id="space"></canvas>

<div id="hud"></div>

<section class="hero">

<div class="glass heroCard">

<div class="logo">

LINE

</div>

<div class="subtitle">

Creative Video Editing • Motion • Short Form Content

</div>

<a
href="https://t.me/line_editor"
class="telegram">

Telegram

</a>

</div>

</section>

<section class="reveal">

<div class="sectionTitle">

Horizontal Edits

</div>

<div class="grid">

<div class="card">

<div class="cardGlow"></div>

Featured Edit

</div>

<div class="card">

<div class="cardGlow"></div>

Project 02

</div>

</div>

</section>

<section class="reveal">

<div class="sectionTitle">

Vertical Edits

</div>

<div class="grid">

<div class="card">

<div class="cardGlow"></div>

Vertical 01

</div>

<div class="card">

<div class="cardGlow"></div>

Vertical 02

</div>

<div class="card">

<div class="cardGlow"></div>

Vertical 03

</div>

</div>

</section>

<footer>

END OF TRANSMISSION

</footer>

<script>

const canvas=
document
.getElementById(
"space"
);

const ctx=
canvas.getContext(
"2d"
);

function resize(){

canvas.width=
innerWidth;

canvas.height=
innerHeight;

}

resize();

onresize=
resize;

let mouse=0;

addEventListener(
"mousemove",
e=>{

mouse=
e.clientX
/
innerWidth;

}
);

const stars=

[
...Array(
900
)
]

.map(
()=>({

x:
Math.random()
*canvas.width,

y:
Math.random()
*canvas.height,

z:
Math.random()
*3+1

})
);

function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

stars.forEach(
s=>{

ctx.fillStyle=
"#8ccfff";

ctx.fillRect(
s.x,
s.y,
s.z,
s.z
);

s.y+=
s.z
*.16;

s.x+=
mouse
*.04
*s.z;

if(
s.y>
canvas.height
){

s.y=0;

s.x=
Math.random()
*canvas.width;

}

}
);

if(
Math.random()
>.995
){

ctx.beginPath();

ctx.moveTo(
0,
80
);

ctx.lineTo(
160,
95
);

ctx.strokeStyle=
"#8ccfff";

ctx.lineWidth=2;

ctx.stroke();

}

requestAnimationFrame(
draw
);

}

draw();

addEventListener(
"scroll",
()=>{

hud.style.height=

(
scrollY

/

(
document.body.scrollHeight
-
innerHeight
)

)

*100

+

"%";

document
.querySelectorAll(
".reveal"
)

.forEach(
el=>{

if(

el
.getBoundingClientRect()
.top

<

innerHeight
*.85

)

el.classList
.add(
"show"
);

}
);

}
);

</script>

</body>
</html>
